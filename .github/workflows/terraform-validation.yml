name: Terraform Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  AWS_DEFAULT_REGION: "us-east-1"
  TF_VAR_allowed_ssh_cidr: "203.0.113.10/32"
  TF_VAR_nginx_dev_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBExampleReplaceThisWithYourDevPublicKey dev@example-lab"
  TF_VAR_nginx_qa_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBExampleReplaceThisWithYourQaPublicKey qa@example-lab"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: 1.8.5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform without backend
        run: terraform init -backend=false

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Initialize TFLint plugins
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Install Checkov
        run: python -m pip install --upgrade pip checkov

      - name: Run Checkov
        run: checkov -d . --compact
